[theme]
primaryColor = "#2e7d32"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f1f8e9"
textColor = "#1b1b1b"
font = "sans serif"

[server]
# 모바일/터널 환경 대응
headless = true
enableCORS = false
enableXsrfProtection = false
# 배포 환경에서 Streamlit 파일 워처(watchdog/inotify)를 끈다.
# 데이터 폴더의 많은 파일을 감시하려다 "inotify instance limit reached"(Errno 24)로
# 앱이 죽는 문제를 차단한다. 배포본은 핫리로드가 필요 없으므로 꺼도 무방하다.
fileWatcherType = "none"
runOnSave = false
